<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="bg-particles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="main-container">
        <div class="brand-section">
            <div class="brand-icon">
                <i class="bi bi-shop"></i>
            </div>
            <h1>POS Restaurant</h1>
            <p>Point of Sale Management System</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-6">
                <a href="terminal/index.html" class="menu-card terminal">
                    <div class="card-content">
                        <div class="icon-wrapper">
                            <i class="bi bi-display"></i>
                        </div>
                        <h2>Terminal POS</h2>
                        <p>Manage transactions, orders, payments, and print receipts from the cashier terminal.</p>
                        <span class="btn-enter">
                            Open Terminal <i class="bi bi-arrow-right"></i>
                        </span>
                    </div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="admin/index.html" class="menu-card admin">
                    <div class="card-content">
                        <div class="icon-wrapper">
                            <i class="bi bi-gear"></i>
                        </div>
                        <h2>Admin Panel</h2>
                        <p>Configure menus, employees, sales reports, and system settings.</p>
                        <span class="btn-enter">
                            Open Admin <i class="bi bi-arrow-right"></i>
                        </span>
                    </div>
                </a>
            </div>
        </div>

        <div class="footer-info">
            <span class="status-dot"></span> Server Online &mdash; POS Restaurant v18.0.1
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
